server:
  port: 8081
  servlet:
    context-path: /auth

spring:
  application:
    name: lis-auth
  main:
    allow-circular-references: true
  config:
    import:
      - optional:nacos:lis-auth.yaml?refresh=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        fail-fast: false
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
        fail-fast: false
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
    redisson:
      file: classpath:redisson.yaml

jwt:
  secret: lis-backend-jwt-secret-key-for-hs512-algorithm-must-be-at-least-512-bits-long-aka-64-bytes
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

logging:
  level:
    com.lis: debug
    org.springframework.security: debug

knife4j:
  enable: true
  setting:
    language: zh-CN
