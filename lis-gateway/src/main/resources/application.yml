server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: lis-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.metrics.SystemMetricsAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.metrics.MetricsAutoConfiguration
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        - id: lis-auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: lis-user
          uri: http://localhost:8082
          predicates:
            - Path=/system/user/**
          filters:
            - StripPrefix=0

        - id: lis-dept
          uri: http://localhost:8082
          predicates:
            - Path=/system/dept/**
          filters:
            - StripPrefix=0

        - id: lis-role
          uri: http://localhost:8082
          predicates:
            - Path=/system/role/**
          filters:
            - StripPrefix=0

        - id: lis-menu
          uri: http://localhost:8082
          predicates:
            - Path=/system/menu/**
          filters:
            - StripPrefix=0

        - id: lis-dict
          uri: http://localhost:8082
          predicates:
            - Path=/system/dict/**
          filters:
            - StripPrefix=0

        - id: lis-specimen
          uri: http://localhost:8083
          predicates:
            - Path=/api/specimen/**
          filters:
            - StripPrefix=0

        - id: lis-test-item
          uri: http://localhost:8083
          predicates:
            - Path=/api/test-item/**
          filters:
            - StripPrefix=0

        - id: lis-department
          uri: http://localhost:8083
          predicates:
            - Path=/api/department/**
          filters:
            - StripPrefix=0

        - id: lis-report
          uri: http://localhost:8084
          predicates:
            - Path=/api/report/**
          filters:
            - StripPrefix=0

        - id: lis-result
          uri: http://localhost:8084
          predicates:
            - Path=/api/result/**
          filters:
            - StripPrefix=0

        - id: lis-critical-value
          uri: http://localhost:8084
          predicates:
            - Path=/api/critical-value/**
          filters:
            - StripPrefix=0

        - id: lis-equipment
          uri: http://localhost:8085
          predicates:
            - Path=/equipment/**
          filters:
            - StripPrefix=0

        - id: lis-hl7
          uri: http://localhost:8086
          predicates:
            - Path=/hl7/**
          filters:
            - StripPrefix=0

        - id: lis-statistics
          uri: http://localhost:8087
          predicates:
            - Path=/statistics/**
          filters:
            - StripPrefix=0

        - id: lis-ai
          uri: http://localhost:8088
          predicates:
            - Path=/ai/**
          filters:
            - StripPrefix=0

  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
    redisson:
      config: |
        singleServerConfig:
          address: "redis://localhost:6379"
          password: null
          database: 0

jwt:
  secret: ${JWT_SECRET:lis-backend-jwt-secret-key-2024-very-long-secret-key-for-security}
  expiration: 86400000
  header: Authorization
  prefix: Bearer

gateway:
  white-list:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/captcha
    - /api/auth/refresh
    - /doc.html
    - /webjars/**
    - /swagger-resources/**
    - /v2/api-docs
    - /v3/api-docs/**
    - /actuator/health

logging:
  level:
    com.lis.gateway: debug
    org.springframework.cloud.gateway: debug

management:
  metrics:
    enable:
      process: false
      system: false
  endpoint:
    health:
      enabled: true
