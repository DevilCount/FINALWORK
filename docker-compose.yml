version: '3.8'

services:
  nacos:
    image: nacos/nacos-server:v2.2.3
    ports:
      - "8848:8848"
    environment:
      - MODE=standalone
      - JVM_XMS=512m
      - JVM_XMX=512m
    networks:
      - lis-network

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=lis
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lis-network

  gateway:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - nacos
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
    networks:
      - lis-network

  auth:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      - nacos
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
    networks:
      - lis-network

networks:
  lis-network:
    driver: bridge